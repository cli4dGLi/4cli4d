<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://unpkg.com/streamlit-component-lib@1.4.0/dist/index.js"></script>
    <style>
      body {
        margin: 0;
        font-family: "Nunito", Arial, sans-serif;
        background: transparent;
        color: #243042;
      }
      .voice-box {
        border: 3px solid #81c784;
        border-radius: 22px;
        background: #f1f8e9;
        padding: 16px;
      }
      .row {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
      }
      button {
        min-height: 64px;
        border: 0;
        border-radius: 18px;
        padding: 12px 18px;
        font-size: 20px;
        font-weight: 900;
        cursor: pointer;
        box-shadow: 0 6px 0 rgba(36, 48, 66, 0.15);
      }
      .start {
        background: #66bb6a;
        color: #ffffff;
      }
      .stop {
        background: #ffa726;
        color: #243042;
      }
      .dot {
        display: inline-block;
        width: 18px;
        height: 18px;
        border-radius: 999px;
        background: #9e9e9e;
        margin-right: 8px;
        vertical-align: middle;
      }
      .dot.on {
        background: #2e7d32;
        box-shadow: 0 0 0 0 rgba(46, 125, 50, 0.65);
        animation: pulse 1.1s infinite;
      }
      @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(46, 125, 50, 0.65); }
        70% { box-shadow: 0 0 0 14px rgba(46, 125, 50, 0); }
        100% { box-shadow: 0 0 0 0 rgba(46, 125, 50, 0); }
      }
      .status {
        font-size: 18px;
        font-weight: 800;
      }
      .transcript {
        margin-top: 12px;
        min-height: 48px;
        padding: 12px;
        border-radius: 14px;
        background: white;
        font-size: 18px;
        line-height: 1.35;
      }
      .fallback {
        display: none;
        margin-top: 10px;
      }
      textarea {
        width: 100%;
        min-height: 70px;
        font-size: 18px;
        border-radius: 14px;
        border: 2px solid #81c784;
        padding: 8px;
      }
    </style>
  </head>
  <body>
    <div class="voice-box">
      <div class="row">
        <button class="start" id="startBtn">🎙️ Start microphone</button>
        <button class="stop" id="stopBtn">Done</button>
        <span class="status"><span class="dot" id="dot"></span><span id="statusText">Microphone is off</span></span>
      </div>
      <div class="transcript" id="transcript">Only text appears here. No audio is stored.</div>
      <div class="fallback" id="fallback">
        <textarea id="manualText" placeholder="If this browser does not support speech recognition, a parent can type what was read here."></textarea>
      </div>
    </div>
    <script>
      const Streamlit = window.Streamlit;
      let args = {};
      let recognition = null;
      let listening = false;
      let transcript = "";
      let startMs = 0;
      let silenceTimer = null;
      const dot = document.getElementById("dot");
      const statusText = document.getElementById("statusText");
      const transcriptBox = document.getElementById("transcript");
      const startBtn = document.getElementById("startBtn");
      const stopBtn = document.getElementById("stopBtn");
      const fallback = document.getElementById("fallback");
      const manualText = document.getElementById("manualText");

      function send(done=false) {
        const elapsedMs = startMs ? Date.now() - startMs : 0;
        Streamlit.setComponentValue({ transcript, listening, done, elapsedMs });
      }

      function setListening(on) {
        listening = on;
        dot.className = on ? "dot on" : "dot";
        statusText.textContent = on ? "Microphone is on" : "Microphone is off";
        send(false);
      }

      function stopListening(done=true) {
        if (recognition) {
          try { recognition.stop(); } catch (e) {}
        }
        clearTimeout(silenceTimer);
        setListening(false);
        send(done);
      }

      function startListening() {
        transcript = "";
        transcriptBox.textContent = "Listening...";
        startMs = Date.now();

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
          fallback.style.display = "block";
          transcriptBox.textContent = "This browser needs Chrome or Edge for microphone reading.";
          send(false);
          return;
        }

        recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = "en-GB";

        recognition.onresult = function(event) {
          let latest = "";
          for (let i = event.resultIndex; i < event.results.length; i++) {
            latest += event.results[i][0].transcript;
          }
          transcript = latest.trim();
          transcriptBox.textContent = transcript || "Listening...";
          window.parent.postMessage({type: "transcript", text: transcript}, "*");
          send(false);
          clearTimeout(silenceTimer);
          silenceTimer = setTimeout(() => stopListening(true), 30000);
        };

        recognition.onspeechend = function() { recognition.stop(); };
        recognition.onend = function() { setListening(false); send(true); };
        recognition.onerror = function() { setListening(false); send(true); };

        setListening(true);
        recognition.start();
      }

      startBtn.addEventListener("click", startListening);
      stopBtn.addEventListener("click", () => stopListening(true));
      manualText.addEventListener("input", () => {
        transcript = manualText.value.slice(0, 2000);
        transcriptBox.textContent = transcript || "Only text appears here. No audio is stored.";
        send(true);
      });

      window.addEventListener("message", (event) => {
        if (event.data.type === "streamlit:render") {
          args = event.data.args || {};
          Streamlit.setFrameHeight(210);
        }
      });
      Streamlit.setComponentReady();
      Streamlit.setFrameHeight(210);
      send(false);
    </script>
  </body>
</html>
